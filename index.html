<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K&P Bank Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f4f6f9;
      display: flex; justify-content: center;
      align-items: center; height: 100vh;
    }
    #chat-window {
      display: flex; flex-direction: column;
      width: 420px; height: 580px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    #chat-header {
      padding: 14px 18px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; gap: 10px;
    }
    #avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #B5D4F4; display: flex; align-items: center;
      justify-content: center; font-size: 13px;
      font-weight: 600; color: #0C447C;
    }
    #header-text p:first-child { font-size: 14px; font-weight: 600; color: #1a202c; }
    #header-text p:last-child  { font-size: 12px; color: #718096; }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #639922; margin-left: auto;
    }
    #messages {
      flex: 1; overflow-y: auto;
      padding: 16px; display: flex;
      flex-direction: column; gap: 12px;
    }
    .msg { display: flex; gap: 8px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }
    .bubble {
      padding: 10px 13px; border-radius: 14px;
      font-size: 14px; line-height: 1.5; color: #1a202c;
    }
    .msg.user .bubble {
      background: #E6F1FB; border-bottom-right-radius: 4px; color: #0C447C;
    }
    .msg.bot .bubble {
      background: #f8fafc; border-bottom-left-radius: 4px;
      border: 1px solid #e2e8f0;
    }
    .bot-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: #B5D4F4; display: flex; align-items: center;
      justify-content: center; font-size: 11px;
      font-weight: 600; color: #0C447C; flex-shrink: 0; margin-top: 2px;
    }
    .intent-badge {
      display: inline-block; margin-top: 6px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 500;
      background: #EAF3DE; color: #3B6D11;
    }
    .escalate-badge { background: #FAEEDA; color: #854F0B; }
    .confidence { font-size: 11px; color: #718096; margin-top: 4px; }
    #input-row {
      display: flex; gap: 8px; padding: 12px 14px;
      border-top: 1px solid #e2e8f0; background: #fff;
    }
    #user-input {
      flex: 1; padding: 9px 13px; font-size: 14px;
      border: 1px solid #e2e8f0; border-radius: 12px;
      background: #f8fafc; color: #1a202c; outline: none;
    }
    #user-input:focus { border-color: #378ADD; }
    #send-btn {
      padding: 9px 16px; font-size: 13px; font-weight: 600;
      background: #185FA5; color: #fff;
      border: none; border-radius: 12px;
      cursor: pointer;
    }
    #send-btn:hover    { background: #0C447C; }
    #send-btn:disabled { background: #e2e8f0; color: #718096; cursor: not-allowed; }
    .typing { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #718096; display: inline-block;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-5px); }
    }
  </style>
</head>
<body>
<div id="chat-window">
  <div id="chat-header">
    <div id="avatar">K&P</div>
    <div id="header-text">
      <p>K&P Bank Assistant</p>
      <p>Always here to help</p>
    </div>
    <div id="status-dot"></div>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="bot-avatar">K</div>
      <div>
        <div class="bubble">Hi! I'm the K&P virtual assistant. How can I help you today?</div>
      </div>
    </div>
  </div>

  <div id="input-row">
    <input id="user-input" type="text" placeholder="Type your message..." />
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  const API_URL = 'http://localhost:8000/predict';
  const messages  = document.getElementById('messages');
  const input     = document.getElementById('user-input');
  const sendBtn   = document.getElementById('send-btn');

  function scrollBottom() { messages.scrollTop = messages.scrollHeight; }

  function addUserMsg(text) {
    const d = document.createElement('div');
    d.className = 'msg user';
    d.innerHTML = `<div class="bubble">${text}</div>`;
    messages.appendChild(d); scrollBottom();
  }

  function addTyping() {
    const d = document.createElement('div');
    d.className = 'msg bot'; d.id = 'typing';
    d.innerHTML = `<div class="bot-avatar">K</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    messages.appendChild(d); scrollBottom(); return d;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function botReply(data) {
    const isEscalate = data.escalate;
    const body = isEscalate
      ? "I'm not fully confident — let me connect you to a human agent."
      : `Got it! It looks like you're asking about <strong>${data.label}</strong>.`;
    const badgeClass = isEscalate ? 'intent-badge escalate-badge' : 'intent-badge';
    const badgeText  = isEscalate ? 'Escalating to agent' : data.label;
    const conf = (data.confidence * 100).toFixed(1);
    const d = document.createElement('div');
    d.className = 'msg bot';
    d.innerHTML = `
      <div class="bot-avatar">K</div>
      <div>
        <div class="bubble">
          ${body}
          <div><span class="${badgeClass}">${badgeText}</span></div>
        </div>
        <div class="confidence">${conf}% confidence</div>
      </div>`;
    messages.appendChild(d); scrollBottom();
  }

  function errorReply() {
    const d = document.createElement('div');
    d.className = 'msg bot';
    d.innerHTML = `<div class="bot-avatar">K</div><div class="bubble" style="color:#A32D2D">Could not reach the server. Make sure your API is running on <code>localhost:8000</code>.</div>`;
    messages.appendChild(d); scrollBottom();
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    input.value = ''; sendBtn.disabled = true;
    addUserMsg(text); addTyping();
    try {
      const res  = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      removeTyping();
      if (!res.ok) throw new Error();
      botReply(await res.json());
    } catch {
      removeTyping(); errorReply();
    } finally {
      sendBtn.disabled = false; input.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
